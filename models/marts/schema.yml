version: 2

models:
  - name: mart_performance_tmae
    description: Tabela principal para consumo no Power BI com performance, benchmarks, rankings, evolucao, outliers e sinalizadores prontos para analise executiva da Coelba versus mercado.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - distribuidora
              - data_referencia
    columns:
      - name: data_referencia
        tests:
          - not_null
      - name: distribuidora
        tests:
          - not_null
      - name: tmae
        tests:
          - not_null
      - name: classificacao_performance
        description: Classificacao executiva com a regra menor TMAE = melhor desempenho.
        tests:
          - accepted_values:
              arguments:
                values: ['Excelente', 'Bom', 'Atencao', 'Critico', 'Sem classificacao']
      - name: tendencia
        tests:
          - accepted_values:
              arguments:
                values: ['Sem historico', 'Estavel', 'Melhora', 'Piora']
      - name: tendencia_anual
        tests:
          - accepted_values:
              arguments:
                values: ['Sem base anual', 'Estavel anual', 'Melhora anual', 'Piora anual']
      - name: flag_outlier_tmae
        tests:
          - accepted_values:
              arguments:
                values: [true, false]
              quote: false
      - name: flag_registro_valido
        tests:
          - accepted_values:
              arguments:
                values: [true, false]
              quote: false
  - name: mart_coelba_tmae
    description: Recorte exclusivo da Neoenergia Coelba para monitoramento gerencial, comparacao com benchmark nacional e leitura executiva do indicador.
  - name: mart_ranking_distribuidoras
    description: Mart focada em comparacao, ranking e benchmark nacional.
  - name: mart_componentes_tmae
    description: Mart de decomposicao do TMAE em TMP, TMD e TME.
  - name: mart_ml_features_tmae
    description: Tabela de features para anomalias, clusters e tendencia.
