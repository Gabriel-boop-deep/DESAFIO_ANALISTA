version: 2

models:
  - name: stg_atendimento_emergencial
    description: >
      Camada staging derivada do CSV real da ANEEL. O modelo pivota os
      indicadores do formato long para uma linha analitica por
      distribuidora/conjunto/periodo. O campo `TMM` do CSV e tratado como TMAE.
    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "not flag_registro_valido or tmp is null or tmp >= 0"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "not flag_registro_valido or tmd is null or tmd >= 0"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "not flag_registro_valido or tme is null or tme >= 0"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "ano between 2000 and extract(year from current_date())"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "not flag_periodo_valido or data_referencia is not null"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "mes between 1 and 12 or not flag_registro_valido"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "tmae >= 0 or not flag_registro_valido"
    columns:
      - name: distribuidora
        tests:
          - not_null
      - name: mes
      - name: flag_registro_valido
        tests:
          - accepted_values:
              arguments:
                values: [true, false]
              quote: false
      - name: flag_neoenergia_coelba
        tests:
          - accepted_values:
              arguments:
                values: [true, false]
              quote: false
      - name: regiao
        tests:
          - accepted_values:
              arguments:
                values: ['Nordeste', 'Centro-Oeste', 'Sudeste', 'Sul', 'Norte', 'Nao informado']
